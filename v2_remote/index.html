<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songo - Multi Joueur (AJAX)</title>
    <!-- Auteur: ONANA GREGOIRE LEGRAND | Matricule: 24G2060 -->
    <style>
        body {
            background-color: #e0ffff;
            text-align: center;
            font-family: sans-serif;
        }
        h1 { color: #008080; }
        
        .le_plateau {
            background: #20b2aa;
            width: 90%;
            max-width: 700px;
            margin: 0 auto;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
        }
        
        .ligne {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }
        
        .trou {
            width: 10vw;
            height: 10vw;
            max-width: 50px;
            max-height: 50px;
            background: #e0ffff;
            border-radius: 50%;
            border: 2px solid teal;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            cursor: pointer;
        }
        
        .trou:hover { background: #b0e0e6; }
        
        .bloque { opacity: 0.5; cursor: not-allowed; }
        
        .affichage_scores { margin-top: 30px; font-size: 20px; }
        
        #message_erreur { color: red; font-weight: bold; margin-bottom: 10px;}
        
        .bouton_choix {
            padding: 15px 30px;
            font-size: 18px;
            background-color: teal;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        
        /* Style pour le bouton musique */
        .btn-musique {
            background-color: #008080;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Le jeu de Songo - AJAX Multi</h1>
    
    <!-- Bouton pour la musique de fond -->
    <button class="btn-musique" id="btn_musique" onclick="toggleMusique()">🎵 Lancer la musique</button>
    
    <!-- Fichiers audios -->
    <audio id="bgMusic" src="../assets/african_song.mp3" loop preload="auto"></audio>
    <audio id="clickSound" src="../assets/click.wav" preload="auto"></audio>
    
    <div id="choix_joueur">
        <h2>Rejoindre une partie</h2>
        <input type="text" id="nom_salle" placeholder="Nom de la salle (ex: 123)" style="padding:10px; font-size:18px; margin-bottom: 15px; border: 2px solid teal; border-radius: 5px;"><br>
        <button class="bouton_choix" onclick="choisirJoueur(0)">Joueur 1 (Bas)</button>
        <button class="bouton_choix" onclick="choisirJoueur(1)">Joueur 2 (Haut)</button>
    </div>

    <div id="zone_jeu" style="display:none;">
        <h3>Mon rôle : <span id="mon_role"></span></h3>
        <h2 id="info_tour">Chargement depuis le serveur (PHP)...</h2>
        
        <div id="message_erreur"></div>

        <div style="margin-bottom: 20px;">
            <button id="btn_pause" class="btn-musique" style="background-color: #f39c12; display:inline-block;" onclick="togglePause()">⏸ Pause</button>
            <button id="btn_abandon" class="btn-musique" style="background-color: #c0392b; display:inline-block;" onclick="abandonner()">🏳️ Abandonner</button>
        </div>

        <div class="le_plateau">
            <div class="ligne" id="ligne_haut"></div>
            <div class="ligne" id="ligne_bas"></div>
        </div>
        
        <div class="affichage_scores">
            <p>Score Joueur 2 (Haut) : <span id="score_j2">0</span></p>
            <p>Score Joueur 1 (Bas) : <span id="score_j1">0</span></p>
        </div>

        <br>
        <button id="btn_rejouer" class="btn-musique" style="display:none; background-color: #28a745;" onclick="recommencer()">🔄 Lancer une nouvelle partie</button>
    </div>

    <br><br>
    <p>Par: ONANA GREGOIRE LEGRAND (24G2060)</p>

    <script>
        // Auteur: ONANA GREGOIRE LEGRAND | Matricule: 24G2060
        
        var mon_id_joueur = -1; // pas encore choisi
        var nom_salle = "";

        var musique_en_cours = false;

        // Fonction pour gerer la musique
        function toggleMusique() {
            var zik = document.getElementById("bgMusic");
            var btn = document.getElementById("btn_musique");
            
            if(musique_en_cours) {
                zik.pause();
                musique_en_cours = false;
                btn.innerHTML = "🎵 Lancer la musique";
                btn.style.backgroundColor = "#008080";
            } else {
                zik.play();
                musique_en_cours = true;
                btn.innerHTML = "🔇 Couper la musique";
                btn.style.backgroundColor = "#cd5c5c";
            }
        }

        function choisirJoueur(id) {
            nom_salle = document.getElementById('nom_salle').value.trim();
            if(nom_salle === "") {
                alert("Veuillez entrer un nom de salle !");
                return;
            }

            mon_id_joueur = id;
            document.getElementById('choix_joueur').style.display = 'none';
            document.getElementById('zone_jeu').style.display = 'block';
            
            if(id == 0) {
                document.getElementById('mon_role').innerHTML = "Joueur 1 (En Bas) | Salle : " + nom_salle;
            } else {
                document.getElementById('mon_role').innerHTML = "Joueur 2 (En Haut) | Salle : " + nom_salle;
            }
            
            // on lance la requete ajax en boucle (1000ms pour eviter de surcharger Vercel)
            setInterval(demanderEtatAuServeur, 1000);
            demanderEtatAuServeur();
        }

        function recommencer() {
            var requete = new XMLHttpRequest();
            requete.open("GET", "../api/server.php?action=reset&room=" + encodeURIComponent(nom_salle), true);
            requete.onload = function() {
                demanderEtatAuServeur();
            };
            requete.send();
        }

        function togglePause() {
            var requete = new XMLHttpRequest();
            requete.open("GET", "../api/server.php?action=pause&room=" + encodeURIComponent(nom_salle), true);
            requete.onload = function() { demanderEtatAuServeur(); };
            requete.send();
        }

        function abandonner() {
            var requete = new XMLHttpRequest();
            requete.open("GET", "../api/server.php?action=abandonner&joueur=" + mon_id_joueur + "&room=" + encodeURIComponent(nom_salle), true);
            requete.onload = function() { demanderEtatAuServeur(); };
            requete.send();
        }

        function cliquerTrou(index_trou) {
            // Jouer le son du clic
            var clic = document.getElementById("clickSound");
            clic.currentTime = 0;
            clic.play();
            
            var requete = new XMLHttpRequest();
            // on envoie notre coup au php
            requete.open("GET", "../api/server.php?action=jouer&trou=" + index_trou + "&joueur=" + mon_id_joueur + "&room=" + encodeURIComponent(nom_salle), true);
            requete.onload = function() {
                var reponse = JSON.parse(requete.responseText);
                if(reponse.erreur) {
                    document.getElementById('message_erreur').innerHTML = reponse.erreur;
                    // efface l'erreur apres 2 secondes
                    setTimeout(function() {
                        document.getElementById('message_erreur').innerHTML = "";
                    }, 2000);
                } else {
                    mettreAjourAffichage(reponse);
                }
            };
            requete.send();
        }

        function demanderEtatAuServeur() {
            // on utilise XMLHttpRequest (AJAX classique pour faire "etudiant") plutot que fetch
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "../api/server.php?action=recuperer_etat&room=" + encodeURIComponent(nom_salle), true);
            xhr.onload = function() {
                if(xhr.status == 200) {
                    var donnees = JSON.parse(xhr.responseText);
                    mettreAjourAffichage(donnees);
                }
            };
            xhr.send();
        }

        function mettreAjourAffichage(etat) {
            var div_haut = document.getElementById('ligne_haut');
            var div_bas = document.getElementById('ligne_bas');
            
            div_haut.innerHTML = "";
            div_bas.innerHTML = "";

            var c_est_mon_tour = false;
            if(etat.joueur_qui_joue == mon_id_joueur) {
                c_est_mon_tour = true;
            }

            // Affichage J2 (Haut) a l'envers (13 à 7)
            for(var i=13; i>=7; i--) {
                var div_trou = document.createElement("div");
                div_trou.className = "trou";
                
                if(c_est_mon_tour == false || mon_id_joueur != 1 || etat.en_pause) {
                    div_trou.className += " bloque";
                }
                
                div_trou.innerHTML = etat.le_plateau[i];
                
                (function(index) {
                    div_trou.onclick = function() { 
                        if(c_est_mon_tour && mon_id_joueur == 1) cliquerTrou(index); 
                    }
                })(i);
                
                div_haut.appendChild(div_trou);
            }

            // Affichage J1 (Bas) de 0 à 6
            for(var i=0; i<=6; i++) {
                var div_trou = document.createElement("div");
                div_trou.className = "trou";
                
                if(c_est_mon_tour == false || mon_id_joueur != 0 || etat.en_pause) {
                    div_trou.className += " bloque";
                }
                
                div_trou.innerHTML = etat.le_plateau[i];
                
                (function(index) {
                    div_trou.onclick = function() { 
                        if(c_est_mon_tour && mon_id_joueur == 0) cliquerTrou(index); 
                    }
                })(i);
                
                div_bas.appendChild(div_trou);
            }

            // on met les scores
            document.getElementById('score_j1').innerHTML = etat.les_scores[0];
            document.getElementById('score_j2').innerHTML = etat.les_scores[1];
            
            // on met le tour
            var btn_pause = document.getElementById("btn_pause");
            var btn_abandon = document.getElementById("btn_abandon");

            if(etat.le_gagnant !== null) {
                var txt = "Égalité !";
                if(etat.le_gagnant == 0) txt = "Le Joueur 1 (Bas) gagne !";
                else if(etat.le_gagnant == 1) txt = "Le Joueur 2 (Haut) gagne !";

                document.getElementById('info_tour').innerHTML = "🏆 JEU TERMINÉ : " + txt;
                document.getElementById('info_tour').style.color = "red";
                document.getElementById('btn_rejouer').style.display = "inline-block";
                btn_pause.style.display = "none";
                btn_abandon.style.display = "none";
            } else {
                document.getElementById('btn_rejouer').style.display = "none";
                btn_pause.style.display = "inline-block";
                btn_abandon.style.display = "inline-block";

                if (etat.en_pause) {
                    document.getElementById('info_tour').style.color = "#f39c12";
                    document.getElementById('info_tour').innerHTML = "⏸ JEU EN PAUSE";
                    btn_pause.innerHTML = "▶️ Reprendre";
                    btn_pause.style.backgroundColor = "#27ae60";
                } else {
                    document.getElementById('info_tour').style.color = "#008080";
                    btn_pause.innerHTML = "⏸ Pause";
                    btn_pause.style.backgroundColor = "#f39c12";

                    if(etat.joueur_qui_joue == 0) {
                        document.getElementById('info_tour').innerHTML = "C'est au Joueur 1 (Bas) de jouer";
                    } else {
                        document.getElementById('info_tour').innerHTML = "C'est au Joueur 2 (Haut) de jouer";
                    }
                }
            }
        }
    </script>
</body>
</html>
